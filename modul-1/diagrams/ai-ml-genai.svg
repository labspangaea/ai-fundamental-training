<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 520" width="760" height="520" font-family="'Manrope','Helvetica Neue',sans-serif">
  <!-- outer: AI -->
  <rect x="20" y="20" width="720" height="480" rx="28" fill="#F7F6EF" stroke="#262620" stroke-width="3"/>
  <text x="50" y="62" font-size="30" font-weight="700" fill="#262620">Artificial Intelligence</text>
  <text x="50" y="90" font-size="17" fill="#54514A">Membuat komputer cerdas — rekomendasi, deteksi wajah.</text>

  <!-- middle: Machine Learning -->
  <rect x="70" y="120" width="620" height="350" rx="24" fill="#F5E6DA" stroke="#D8896B" stroke-width="2.5"/>
  <text x="100" y="162" font-size="26" font-weight="700" fill="#262620">Machine Learning</text>
  <text x="100" y="188" font-size="16" fill="#54514A">Belajar dari data — prediksi penjualan, deteksi fraud.</text>

  <!-- inner: Generative AI -->
  <rect x="120" y="218" width="520" height="230" rx="20" fill="#B85838" stroke="#262620" stroke-width="2.5"/>
  <text x="150" y="262" font-size="26" font-weight="700" fill="#FFFFFF">Generative AI</text>
  <text x="150" y="290" font-size="16" fill="#F5E6DA">Membuat konten baru.</text>
  <text x="150" y="338" font-size="18" font-weight="700" fill="#FFFFFF">ChatGPT · Gemini</text>
  <text x="150" y="368" font-size="18" font-weight="700" fill="#FFFFFF">Claude · Midjourney</text>

  <!-- subset note -->
  <text x="630" y="438" text-anchor="end" font-size="14" fill="#F5E6DA">⊂ bagian dari ML ⊂ bagian dari AI</text>
</svg>
