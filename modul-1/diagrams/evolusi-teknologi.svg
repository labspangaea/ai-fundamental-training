<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 300" width="980" height="300" font-family="'Manrope','Helvetica Neue',sans-serif">
  <defs>
    <marker id="ar" markerWidth="12" markerHeight="12" refX="7" refY="5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L9,5 L0,10 z" fill="#B85838"/>
    </marker>
  </defs>

  <!-- baseline -->
  <line x1="40" y1="150" x2="940" y2="150" stroke="#E2E0D6" stroke-width="2"/>

  <!-- node 1: Internet -->
  <rect x="40" y="95" width="190" height="110" rx="16" fill="#F7F6EF" stroke="#262620" stroke-width="2.5"/>
  <text x="135" y="140" text-anchor="middle" font-size="28" font-weight="700" fill="#262620">Internet</text>
  <text x="135" y="172" text-anchor="middle" font-size="16" fill="#54514A">menghubungkan</text>
  <text x="135" y="192" text-anchor="middle" font-size="16" fill="#54514A">informasi</text>
  <line x1="230" y1="150" x2="270" y2="150" stroke="#B85838" stroke-width="3" marker-end="url(#ar)"/>

  <!-- node 2: Smartphone -->
  <rect x="280" y="95" width="190" height="110" rx="16" fill="#F7F6EF" stroke="#262620" stroke-width="2.5"/>
  <text x="375" y="140" text-anchor="middle" font-size="28" font-weight="700" fill="#262620">Smartphone</text>
  <text x="375" y="172" text-anchor="middle" font-size="16" fill="#54514A">informasi selalu</text>
  <text x="375" y="192" text-anchor="middle" font-size="16" fill="#54514A">tersedia</text>
  <line x1="470" y1="150" x2="510" y2="150" stroke="#B85838" stroke-width="3" marker-end="url(#ar)"/>

  <!-- node 3: Cloud -->
  <rect x="520" y="95" width="190" height="110" rx="16" fill="#F7F6EF" stroke="#262620" stroke-width="2.5"/>
  <text x="615" y="140" text-anchor="middle" font-size="28" font-weight="700" fill="#262620">Cloud</text>
  <text x="615" y="172" text-anchor="middle" font-size="16" fill="#54514A">komputasi lebih</text>
  <text x="615" y="192" text-anchor="middle" font-size="16" fill="#54514A">murah</text>
  <line x1="710" y1="150" x2="750" y2="150" stroke="#B85838" stroke-width="3" marker-end="url(#ar)"/>

  <!-- node 4: AI (accent) -->
  <rect x="760" y="88" width="190" height="124" rx="16" fill="#F5E6DA" stroke="#B85838" stroke-width="3"/>
  <text x="855" y="140" text-anchor="middle" font-size="30" font-weight="700" fill="#B85838">AI</text>
  <text x="855" y="172" text-anchor="middle" font-size="16" fill="#54514A">mengolah info</text>
  <text x="855" y="192" text-anchor="middle" font-size="16" fill="#54514A">otomatis</text>

  <text x="40" y="50" font-size="20" font-weight="700" fill="#262620">Evolusi Teknologi</text>
  <text x="40" y="76" font-size="15" fill="#54514A">Setiap lapisan menjadi fondasi untuk lapisan berikutnya.</text>
</svg>
