<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 420" width="980" height="420" font-family="'Manrope','Helvetica Neue',sans-serif">

  <!-- Top-left: BERULANG -->
  <rect x="20" y="20" width="460" height="180" rx="18" fill="#F5E6DA" stroke="#B85838" stroke-width="2.5"/>
  <!-- repeat icon -->
  <path d="M68 80 a22 22 0 1 1 0 44" fill="none" stroke="#B85838" stroke-width="4" stroke-linecap="round"/>
  <path d="M56 118 l12 8 l4 -14" fill="none" stroke="#B85838" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="110" y="88" font-size="24" font-weight="700" fill="#262620">Berulang</text>
  <text x="110" y="114" font-size="17" fill="#54514A">Membalas email, membuat laporan,</text>
  <text x="110" y="136" font-size="17" fill="#54514A">rekap meeting, update status rutin.</text>
  <text x="42" y="180" font-size="15" font-weight="700" fill="#B85838">→ Otomasi &amp; draft lebih cepat</text>

  <!-- Top-right: BANYAK DOKUMEN -->
  <rect x="500" y="20" width="460" height="180" rx="18" fill="#F7F6EF" stroke="#B85838" stroke-width="2.5"/>
  <!-- docs icon -->
  <rect x="548" y="62" width="36" height="46" rx="5" fill="#F5E6DA" stroke="#B85838" stroke-width="3.5"/>
  <rect x="562" y="54" width="36" height="46" rx="5" fill="#F5E6DA" stroke="#B85838" stroke-width="3.5"/>
  <rect x="576" y="46" width="36" height="46" rx="5" fill="#F5E6DA" stroke="#B85838" stroke-width="3.5"/>
  <path d="M582 62 h18 M582 72 h12" fill="none" stroke="#B85838" stroke-width="2.5" stroke-linecap="round"/>
  <text x="630" y="74" font-size="24" font-weight="700" fill="#262620">Banyak Dokumen</text>
  <text x="630" y="100" font-size="17" fill="#54514A">SOP, kontrak, kebijakan, handbook,</text>
  <text x="630" y="122" font-size="17" fill="#54514A">proposal, materi pelatihan.</text>
  <text x="522" y="180" font-size="15" font-weight="700" fill="#B85838">→ Ringkas, cari, analisis instan</text>

  <!-- Bottom-left: MENCARI INFORMASI -->
  <rect x="20" y="220" width="460" height="180" rx="18" fill="#F7F6EF" stroke="#B85838" stroke-width="2.5"/>
  <!-- search icon -->
  <circle cx="72" cy="290" r="22" fill="none" stroke="#B85838" stroke-width="4"/>
  <path d="M88 306 l16 16" fill="none" stroke="#B85838" stroke-width="4" stroke-linecap="round"/>
  <text x="110" y="282" font-size="24" font-weight="700" fill="#262620">Mencari Informasi</text>
  <text x="110" y="308" font-size="17" fill="#54514A">FAQ pelanggan, product knowledge,</text>
  <text x="110" y="330" font-size="17" fill="#54514A">kebijakan, prosedur, regulasi.</text>
  <text x="42" y="380" font-size="15" font-weight="700" fill="#B85838">→ Jawaban konsisten &amp; cepat</text>

  <!-- Bottom-right: MEMBUAT KONTEN -->
  <rect x="500" y="220" width="460" height="180" rx="18" fill="#F5E6DA" stroke="#B85838" stroke-width="2.5"/>
  <!-- pencil icon -->
  <path d="M552 336 l6 -48 l28 8 l-34 40 z" fill="#F5E6DA" stroke="#B85838" stroke-width="3.5" stroke-linejoin="round"/>
  <path d="M558 288 l28 8" fill="none" stroke="#B85838" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M552 336 l8 -4 l-2 -8" fill="none" stroke="#B85838" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="600" y="272" font-size="24" font-weight="700" fill="#262620">Membuat Konten</text>
  <text x="600" y="298" font-size="17" fill="#54514A">Proposal, presentasi, email,</text>
  <text x="600" y="320" font-size="17" fill="#54514A">materi training, laporan.</text>
  <text x="522" y="380" font-size="15" font-weight="700" fill="#B85838">→ Draft pertama dalam menit</text>

</svg>
