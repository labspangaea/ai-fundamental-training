<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1020 400" width="1020" height="400" font-family="'Manrope','Helvetica Neue',sans-serif">
  <defs>
    <marker id="ra" markerWidth="10" markerHeight="10" refX="7" refY="5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L9,5 L0,10 z" fill="#D8896B"/>
    </marker>
  </defs>

  <!-- Ascending baseline -->
  <polyline points="60,340 220,280 390,220 560,160 730,100 920,46" fill="none" stroke="#E2E0D6" stroke-width="2" stroke-dasharray="6 6"/>

  <!-- Stage 1 — AI Individual -->
  <rect x="20" y="278" width="160" height="110" rx="14" fill="#F7F6EF" stroke="#B85838" stroke-width="2.5"/>
  <circle cx="48" cy="302" r="16" fill="#B85838"/>
  <text x="48" y="308" text-anchor="middle" font-size="16" font-weight="700" fill="#FFFFFF">1</text>
  <text x="35" y="332" font-size="16" font-weight="700" fill="#262620">AI Individual</text>
  <text x="35" y="352" font-size="13" fill="#54514A">ChatGPT,</text>
  <text x="35" y="368" font-size="13" fill="#54514A">Gemini, Claude</text>
  <text x="35" y="384" font-size="13" fill="#B85838">Mulai sendiri</text>

  <!-- Arrow 1→2 -->
  <line x1="180" y1="318" x2="210" y2="306" stroke="#D8896B" stroke-width="2.5" marker-end="url(#ra)"/>

  <!-- Stage 2 — Knowledge Management -->
  <rect x="214" y="218" width="162" height="118" rx="14" fill="#F7F6EF" stroke="#B85838" stroke-width="2.5"/>
  <circle cx="242" cy="242" r="16" fill="#B85838"/>
  <text x="242" y="248" text-anchor="middle" font-size="16" font-weight="700" fill="#FFFFFF">2</text>
  <text x="228" y="272" font-size="14" font-weight="700" fill="#262620">Knowledge</text>
  <text x="228" y="290" font-size="14" font-weight="700" fill="#262620">Management</text>
  <text x="228" y="310" font-size="13" fill="#54514A">NotebookLM,</text>
  <text x="228" y="326" font-size="13" fill="#54514A">dokumen internal</text>
  <text x="228" y="332" font-size="0" fill="#B85838"> </text>

  <!-- Arrow 2→3 -->
  <line x1="376" y1="258" x2="406" y2="246" stroke="#D8896B" stroke-width="2.5" marker-end="url(#ra)"/>

  <!-- Stage 3 — Tim & Departemen -->
  <rect x="410" y="156" width="162" height="120" rx="14" fill="#F5E6DA" stroke="#B85838" stroke-width="2.5"/>
  <circle cx="438" cy="180" r="16" fill="#B85838"/>
  <text x="438" y="186" text-anchor="middle" font-size="16" font-weight="700" fill="#FFFFFF">3</text>
  <text x="424" y="210" font-size="14" font-weight="700" fill="#262620">Tim &amp;</text>
  <text x="424" y="228" font-size="14" font-weight="700" fill="#262620">Departemen</text>
  <text x="424" y="248" font-size="13" fill="#54514A">FAQ bersama,</text>
  <text x="424" y="264" font-size="13" fill="#54514A">knowledge base</text>
  <text x="424" y="272" font-size="0"> </text>

  <!-- Arrow 3→4 -->
  <line x1="572" y1="196" x2="602" y2="180" stroke="#D8896B" stroke-width="2.5" marker-end="url(#ra)"/>

  <!-- Stage 4 — AI Chatbot -->
  <rect x="606" y="94" width="162" height="122" rx="14" fill="#F7F6EF" stroke="#B85838" stroke-width="2.5"/>
  <circle cx="634" cy="118" r="16" fill="#B85838"/>
  <text x="634" y="124" text-anchor="middle" font-size="16" font-weight="700" fill="#FFFFFF">4</text>
  <text x="620" y="150" font-size="14" font-weight="700" fill="#262620">AI Chatbot</text>
  <text x="620" y="170" font-size="13" fill="#54514A">Internal</text>
  <text x="620" y="186" font-size="13" fill="#54514A">Assistant,</text>
  <text x="620" y="202" font-size="13" fill="#54514A">customer bot</text>
  <text x="620" y="212" font-size="0"> </text>

  <!-- Arrow 4→5 -->
  <line x1="768" y1="136" x2="796" y2="118" stroke="#D8896B" stroke-width="2.5" marker-end="url(#ra)"/>

  <!-- Stage 5 — AI Agent -->
  <rect x="800" y="34" width="180" height="128" rx="14" fill="#B85838" stroke="#262620" stroke-width="2.5"/>
  <circle cx="828" cy="58" r="16" fill="#FFFFFF"/>
  <text x="828" y="64" text-anchor="middle" font-size="16" font-weight="700" fill="#B85838">5</text>
  <text x="814" y="92" font-size="14" font-weight="700" fill="#FFFFFF">AI Agent &amp;</text>
  <text x="814" y="112" font-size="14" font-weight="700" fill="#FFFFFF">Automation</text>
  <text x="814" y="132" font-size="13" fill="#F5E6DA">Workflow</text>
  <text x="814" y="148" font-size="13" fill="#F5E6DA">otomatis penuh</text>

  <!-- label bottom -->
  <text x="510" y="388" text-anchor="middle" font-size="16" font-weight="700" fill="#B85838">Adopsi AI — dari individu menuju organisasi</text>
</svg>
