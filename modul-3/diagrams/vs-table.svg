    <text x="857" y="208" text-anchor="middle" font-weight="700" fill="#2F7D4F">✓</text>
    <line x1="20" y1="232" x2="1020" y2="232" stroke="#E2E0D6" stroke-width="1.5"/>

    <text x="30" y="284" fill="#262620">Menunjukkan sumber jawaban</text>
