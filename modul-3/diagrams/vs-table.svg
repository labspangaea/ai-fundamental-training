  <text x="857" y="58" text-anchor="middle" font-size="22" font-weight="700" fill="#B85838">NotebookLM</text>
  <line x1="20" y1="80" x2="1020" y2="80" stroke="#262620" stroke-width="2"/>

  <!-- rows -->
  <g font-size="19">
    <text x="30" y="132" fill="#262620">Pengetahuan umum</text>
