<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 400" width="1000" height="400" font-family="'Manrope','Helvetica Neue',sans-serif">
  <!-- question -->
  <rect x="20" y="24" width="520" height="60" rx="30" fill="none" stroke="#262620" stroke-width="2"/>
  <text x="48" y="62" font-size="20" font-weight="700" fill="#262620">"Apa kebijakan cuti tahunan?"</text>

  <!-- answer card -->
  <rect x="20" y="108" width="700" height="120" rx="16" fill="#F7F6EF" stroke="#262620" stroke-width="2.5"/>
  <text x="44" y="152" font-size="20" fill="#262620">Cuti tahunan adalah <tspan font-weight="700">12 hari kerja</tspan> per tahun</text>
  <text x="44" y="186" font-size="20" fill="#262620">dan diajukan minimal H-3.</text>
  <rect x="476" y="132" width="40" height="30" rx="8" fill="#F5E6DA" stroke="#B85838" stroke-width="1.5"/>
  <text x="496" y="153" text-anchor="middle" font-size="16" font-weight="700" fill="#B85838">1</text>
  <rect x="300" y="166" width="40" height="30" rx="8" fill="#F5E6DA" stroke="#B85838" stroke-width="1.5"/>
  <text x="320" y="187" text-anchor="middle" font-size="16" font-weight="700" fill="#B85838">2</text>

  <!-- dotted links to sources -->
  <path d="M496 162 L470 300" stroke="#B85838" stroke-width="2" stroke-dasharray="3 6"/>
  <path d="M320 196 L150 300" stroke="#B85838" stroke-width="2" stroke-dasharray="3 6"/>

  <!-- source pills -->
  <text x="20" y="288" font-size="16" font-weight="700" letter-spacing="1.5" fill="#8A8276">SUMBER</text>
  <rect x="20" y="300" width="260" height="58" rx="12" fill="#F7F6EF" stroke="#262620" stroke-width="2"/>
  <text x="40" y="326" font-size="16" font-weight="700" fill="#B85838">[2]</text>
  <text x="78" y="326" font-size="16" fill="#262620">Employee Handbook</text>
  <text x="40" y="348" font-size="14" fill="#54514A">bab 3 · hal. 18</text>

  <rect x="360" y="300" width="220" height="58" rx="12" fill="#F7F6EF" stroke="#262620" stroke-width="2"/>
  <text x="380" y="326" font-size="16" font-weight="700" fill="#B85838">[1]</text>
  <text x="418" y="326" font-size="16" fill="#262620">SOP HR</text>
  <text x="380" y="348" font-size="14" fill="#54514A">hal. 12</text>

  <text x="640" y="335" font-size="17" font-weight="700" fill="#B85838">Periksa sumbernya,</text>
  <text x="640" y="358" font-size="17" fill="#54514A">jangan hanya jawabannya.</text>
</svg>
